# aios_sounds.conf — per-project/brain sound overrides
#
# Place this file at your project or brain root. AIOS walks up from the
# working directory to find the nearest copy, stopping at $HORIZON_ROOT.
#
# Format: event_name = sound_path
#   sound_path is relative to $HORIZON_BIN/sounds/ unless absolute.
#   To use a project-local sound, use an absolute path or place the file
#   in $HORIZON_BIN/sounds/ and reference it by filename.
#
# Unmapped keys fall through to the harness map, then to the AIOS default
# ($HORIZON_BIN/sounds/sounds.map). Comment out any line to use the default.
#
# Available generic events:
# task_complete   = WorkComplete_ork.wav
# api_error       = APIFail.wav
# input_needed    =
# session_start   =
# session_stop    =
# notification    =
#
# Claude Code events:
# claude.input_needed  = claude_event_sounds/InputNeeded.wav
# claude.context_30    = claude_event_sounds/claude_at_30_statusline.wav
# claude.context_40    = claude_event_sounds/claude_at_40_statusline.wav
# claude.context_50    = claude_event_sounds/claude_at_50_statusline.wav
# claude.context_60    = claude_event_sounds/claude_at_60_statusline.wav
# claude.context_70    = claude_event_sounds/claude_at_70_statusline.wav
# claude.context_80    = claude_event_sounds/claude_at_80_statusline.wav
# claude.context_90    = claude_event_sounds/claude_at_90_statusline.wav
#
# Example — silence all sounds in this project:
# task_complete =
# api_error     =
# input_needed  =
