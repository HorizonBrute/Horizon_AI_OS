# aios_statusline.conf — per-project statusline configuration
#
# Place at project or brain root. AIOS walks up from cwd to find nearest copy.
# Format: key = value
# Lines starting with # are ignored. Unset keys use AIOS defaults.

# Display components (true/false)
# show_git          = true
# show_context_bar  = true

# Context bar width in characters
# bar_width         = 20

# Override the directory label shown in the statusline
# project_name      = MyProject

# Context usage thresholds that trigger audio alerts (comma-separated percentages)
# Sounds resolve via aios_sounds.conf → harness sounds.map → AIOS sounds.map
# context_thresholds = 30,40,50,60,70,80,90
