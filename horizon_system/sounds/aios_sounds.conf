# Horizon AIOS — Master sound settings
#
# This is the MASTER control for AIOS event sounds. It applies to every
# project, brain, and harness under $HORIZON_ROOT. Read by resolve_sound.py
# before any event is resolved.
#
# sounds_enabled = true | false
#   true   (default) Event sounds play. Individual projects may still mute
#                    their own subtree with a project-local aios_sounds.conf
#                    (sounds_enabled = false).
#   false            ALL event sounds are silenced everywhere. This is an
#                    absolute kill switch — no project can re-enable sound
#                    while the master is off.
#
# Accepted values: true/false, 1/0, yes/no, on/off, enabled/disabled.
#
# This file is for the master on/off flag only. Event -> sound mappings live
# in sounds.map (AIOS defaults) or a project's own aios_sounds.conf.

sounds_enabled = true
