# =============================================================================
# file_acl_hardening.toml  —  Horizon.AIOS ACL hardening posture  (SHIPPED DEFAULT)
# =============================================================================
# This file declares the AUTHORITATIVE ACL posture that horizon_aios_harden.py
# applies (and horizon_aios_doctor.py verifies) on every platform. It is the
# externalized form of the model previously hardcoded in harden.py.
#
# DEPLOYERS: do NOT edit this file. It is an official, git-tracked path and the
# nightly AIOS sync (horizon_aios_sync.py hard-restore) will overwrite local
# edits here. To customize the stance, create:
#
#     $HORIZON_ETC/file_acl_hardening.local.toml
#
# and put ONLY your overrides there. The engine deep-merges the local file over
# this default, keyed by rule/group `name` (local wins; a local rule with an
# existing name replaces that rule's fields; a new name adds a rule). The
# .local file is gitignored, so it survives every nightly sync untouched.
# A starter copy ships as file_acl_hardening.local.toml.template.
#
# PLATFORM MODEL: rules are ABSTRACT INTENT. The engine translates each rule to
# the native mechanism per OS — setfacl (Linux), chmod +a (macOS), icacls
# (Windows). Single-OS deployers never write platform ACL syntax. For a rule
# that needs a genuine platform-specific escape hatch, add a [rules.raw] table
# (see the schema notes at the bottom).
# =============================================================================

schema_version = 1

# Path variables usable in every rule `path`. Resolved by the engine.
#   $HORIZON_ROOT    the AIOS layer root (parent of horizon_system/)
#   $HORIZON_SYSTEM  $HORIZON_ROOT/horizon_system
# (No trailing slashes; the engine joins sub-paths.)

# -----------------------------------------------------------------------------
# Groups the engine ensures exist (idempotent) before applying rules. An empty
# group grants nobody — safe on a bare server with no enrolled members.
# -----------------------------------------------------------------------------
[[groups]]
name = "brains"
description = "Horizon.AIOS group: brains"

[[groups]]
name = "horizon_humans"
description = "Horizon.AIOS Actual Humans"

# -----------------------------------------------------------------------------
# Principals that must NEVER lose Full control, regardless of mode.
#   Windows: re-granted Full after the inheritance break at $HORIZON_ROOT.
#   Unix:    only `owner` is meaningful (no SYSTEM/Administrators analogue).
# Well-known SIDs keep Windows locale-independent (SYSTEM=S-1-5-18,
# Administrators=S-1-5-32-544); the engine maps these names to SIDs.
# -----------------------------------------------------------------------------
must_have_full = ["owner", "SYSTEM", "Administrators"]

# -----------------------------------------------------------------------------
# RULES  —  applied top-to-bottom. Order matters: a later rule on a nested path
# overrides an earlier broad rule for that subtree, and all `deny` rules are
# applied AFTER all grants (the engine enforces grant-before-deny ordering so an
# inherited allow can never reach a privileged dir). Keep this order.
#
# rights vocabulary (abstract; per-OS mapping in parentheses):
#   full            rwx + inheritable        (setfacl rwx / chmod +a full / icacls (OI)(CI)F-equiv for the group)
#   read-exec       r-x  read + traverse, NO write
#   read-only       r--  read, no traverse/write
#   read-write      rwx  read + write + traverse
#   create-traverse -wx  create + enter, NO list (self-service isolation parent)
#   no-write        reads intact, DENY write/append/delete/attr (brains catch-all)
#   deny            full deny (no access at all)
#   none            strip the principal to --- (peer isolation on a child)
#
# flags (all optional, default false/unset):
#   recursive         apply down the whole subtree (-R)
#   default           also set as the inherited/default ACL for NEW children
#   sticky            set the sticky bit (+t): only an entry's owner may delete it
#   setgid = true|false   true = set sgid (new children group-inherit); false =
#                     explicitly clear sgid; omit = leave as-is
#   isolate_children  new entries born owner-only (default:group:<p>:--- + default:other:---)
#   exclude_children  list of child basenames the recursive/none pass skips (e.g. "shared")
#   kind = "grant"|"deny"   apply phase; denies run after grants. Default "grant".
# -----------------------------------------------------------------------------

# ---- horizon_humans: user space (whole root) Full, then system read-only ----

[[rules]]
name = "humans-userspace-full"
path = "$HORIZON_ROOT"
principal = "horizon_humans"
rights = "full"
recursive = true
default = true
# Rationale: humans own the user-space layer outside horizon_system/. An empty
# group makes this a no-op (server reduces to owner-only write).

[[rules]]
name = "humans-system-readonly"
path = "$HORIZON_SYSTEM"
principal = "horizon_humans"
rights = "read-exec"
recursive = true
default = true
# Overrides humans-userspace-full for the install subtree: install-wide
# config/canon/tooling is admin-authored; humans get read+traverse, no write.

[[rules]]
name = "humans-root-canon-readonly"
path = "$HORIZON_ROOT"
principal = "horizon_humans"
rights = "read-only"
canon_files = ["agents.md", "CLAUDE.md", ".claude/agents.md", ".claude/CLAUDE.md"]
sticky_parents = true
# Install-wide canon lives outside horizon_system but is admin-owned. r-- on
# each file; the sticky bit on each canon PARENT dir stops a human from
# unlink+recreating the file via the writable parent (they keep deleting their
# OWN files there). `canon_files` are relative to $HORIZON_ROOT; only existing
# ones are touched.

[[rules]]
name = "humans-brains-readwrite"
path = "$HORIZON_ROOT/brains"
principal = "horizon_humans"
rights = "read-write"
recursive = true
default = true
# Humans are near-admins who maintain brains/apps. Brain-to-brain isolation is a
# SEPARATE property (each brains/<name> is 0770 <name>:<name> with g:brains:---):
# a per-owner chown cannot be expressed in the abstract, mode-bit rule set, so it
# is enforced by the Linux-only step linux_brains_workspace_ops() in
# horizon_aios_acl_posture.py (twin of linux_traverse_ops), self-healing on every
# harden pass. This humans grant does not open one brain to another.

# ---- horizon_humans: the four self-service areas (SELF-SERVICE ISOLATION) ----
# One rule-pair per area. Parent = create-traverse (-wx): any human self-creates
# their own entries directly (owner + own private group, since setgid is cleared),
# but cannot list the parent to enumerate peers. sticky = can't delete peers'
# entries. isolate_children = new entries born owner-only. A group-shared
# `shared/` drop-zone per area is the explicit A->B handoff escape hatch.

[[rules]]
name = "humans-projects-selfservice"
path = "$HORIZON_ROOT/projects"
principal = "horizon_humans"
rights = "create-traverse"
sticky = true
setgid = false
isolate_children = true
exclude_children = ["shared"]

[[rules]]
name = "humans-projects-shared"
path = "$HORIZON_ROOT/projects/shared"
principal = "horizon_humans"
rights = "read-write"
default = true
sticky = true
setgid = true
group_owner = "horizon_humans"
# setgid + group_owner => files dropped here are group-owned by horizon_humans,
# so a genuine cross-user/utility handoff is readable by all humans.

[[rules]]
name = "humans-handoffs-selfservice"
path = "$HORIZON_ROOT/handoffs"
principal = "horizon_humans"
rights = "create-traverse"
sticky = true
setgid = false
isolate_children = true
exclude_children = ["shared"]

[[rules]]
name = "humans-handoffs-shared"
path = "$HORIZON_ROOT/handoffs/shared"
principal = "horizon_humans"
rights = "read-write"
default = true
sticky = true
setgid = true
group_owner = "horizon_humans"

[[rules]]
name = "humans-objectives-selfservice"
path = "$HORIZON_ROOT/objectives"
principal = "horizon_humans"
rights = "create-traverse"
sticky = true
setgid = false
isolate_children = true
exclude_children = ["shared"]

[[rules]]
name = "humans-objectives-shared"
path = "$HORIZON_ROOT/objectives/shared"
principal = "horizon_humans"
rights = "read-write"
default = true
sticky = true
setgid = true
group_owner = "horizon_humans"

[[rules]]
name = "humans-usrbin-selfservice"
path = "$HORIZON_ROOT/usrbin"
principal = "horizon_humans"
rights = "create-traverse"
sticky = true
setgid = false
isolate_children = true
exclude_children = ["shared"]

[[rules]]
name = "humans-usrbin-shared"
path = "$HORIZON_ROOT/usrbin/shared"
principal = "horizon_humans"
rights = "read-write"
default = true
sticky = true
setgid = true
group_owner = "horizon_humans"

# ---- brains group: execute dirs, denied privileged dirs, no-write elsewhere --

[[rules]]
name = "brains-bin-readexec"
path = "$HORIZON_SYSTEM/bin"
principal = "brains"
rights = "read-exec"
recursive = true
default = true

[[rules]]
name = "brains-skills-bin-readexec"
path = "$HORIZON_SYSTEM/skills_bin"
principal = "brains"
rights = "read-exec"
recursive = true
default = true

[[rules]]
name = "brains-system-nowrite"
path = "$HORIZON_SYSTEM"
principal = "brains"
rights = "no-write"
recursive = true
default = true
kind = "deny"
# Catch-all: reads stay allowed across the install, but brains get NO write
# anywhere in horizon_system. Applied as a deny (after the read-exec grants).

[[rules]]
name = "brains-sbin-deny"
path = "$HORIZON_SYSTEM/sbin"
principal = "brains"
rights = "deny"
recursive = true
default = true
kind = "deny"

[[rules]]
name = "brains-skills-sbin-deny"
path = "$HORIZON_SYSTEM/skills_sbin"
principal = "brains"
rights = "deny"
recursive = true
default = true
kind = "deny"

[[rules]]
name = "brains-logs-deny"
path = "$HORIZON_SYSTEM/logs"
principal = "brains"
rights = "deny"
recursive = true
default = true
kind = "deny"

# =============================================================================
# SCHEMA NOTES  (for deployers writing file_acl_hardening.local.toml)
# =============================================================================
# * Override a shipped rule: add a [[rules]] with the SAME `name` and only the
#   fields you want changed — they merge over the default (local wins).
# * Disable a shipped rule: add [[rules]] with its `name` and `disabled = true`.
# * Add a new area: add a [[rules]] with a fresh `name`.
# * Platform escape hatch: attach a per-OS raw block to any rule to bypass the
#   abstract translation for that OS, e.g.
#       [[rules]]
#       name = "my-custom"
#       path = "$HORIZON_ROOT/whatever"
#       [rules.raw]
#       linux   = ["g:somegroup:r-x"]          # setfacl -m args
#       macos   = ["group:somegroup allow read,execute"]   # chmod +a args
#       windows = ["somegroup:(RX)"]            # icacls /grant args
#   raw entries are applied verbatim and are the deployer's responsibility.
# * modes: `--strict` (harden CLI) still takes ownership + drops inherited ACEs
#   as before; the posture file governs WHAT is granted/denied, not the
#   additive-vs-strict delivery mechanism.
# =============================================================================
